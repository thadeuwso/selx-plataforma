<!-- @dsCard group="Spacing" viewport="700x160" name="Foco e bordas" subtitle="Anel de foco sempre visível · bordas em 3 intensidades" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; background: var(--surface-default); font-family: var(--font-sans); color: var(--text-body); }

</style>
</head>
<body>
<div style="display: flex; gap: 24px; align-items: center;">
<div style="flex: 1;">
  <div style="font-size: 11px; color: var(--text-subtle); margin-bottom: 8px;">--focus-ring (teclado)</div>
  <span style="display: inline-block; background: var(--action-primary); color: #fff; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius-md); box-shadow: var(--focus-ring);">Publicar vaga</span>
</div>
<div style="flex: 2;">
  <div style="font-size: 11px; color: var(--text-subtle); margin-bottom: 8px;">Bordas</div>
  <div style="display: flex; gap: 12px;">
    
    <div style="flex: 1; height: 44px; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted);">subtle · divisores</div>
    <div style="flex: 1; height: 44px; border: 1px solid var(--border-default); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted);">default · controles</div>
    <div style="flex: 1; height: 44px; border: 1px solid var(--border-strong); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted);">strong · ênfase</div>
  </div>
</div>
</div>
</body>
</html>
