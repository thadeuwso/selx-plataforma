<!-- @dsCard group="Colors" viewport="700x190" name="Tema escuro" subtitle="Nasce junto — mesma hierarquia, mesmo significado" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; background: var(--surface-default); font-family: var(--font-sans); }
.row { display: flex; gap: 8px; align-items: center; }
.sw { flex: 1; height: 64px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; box-sizing: border-box; }
.sw span { font-size: 10px; font-family: var(--font-mono); }

</style>
</head>
<body>
<div data-theme="dark" style="background: var(--surface-page); border-radius: var(--radius-lg); padding: 16px; display: flex; gap: 12px; align-items: stretch;">
  <div style="flex: 1; background: var(--surface-default); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 12px;">
    <div style="color: var(--text-strong); font-weight: 600; font-size: 14px;">Analista de dados</div>
    <div style="color: var(--text-muted); font-size: 12px; margin-top: 2px;">34 candidaturas · publicada há 12 dias</div>
    <div style="display: flex; gap: 8px; margin-top: 12px;">
      <span style="background: var(--action-primary); color: var(--text-inverse); font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-md);">Ver candidatos</span>
      <span style="background: var(--surface-default); border: 1px solid var(--action-secondary-border); color: var(--text-body); font-size: 12px; padding: 6px 12px; border-radius: var(--radius-md);">Editar</span>
    </div>
  </div>
  <div style="flex: 1; display: flex; flex-direction: column; gap: 6px; justify-content: center;">
    <span style="align-self: flex-start; background: var(--feedback-success-surface); border: 1px solid var(--feedback-success-border); color: var(--feedback-success); font-size: 11px; padding: 2px 10px; border-radius: 999px;">● Aprovado na etapa</span>
    <span style="align-self: flex-start; background: var(--feedback-warning-surface); border: 1px solid var(--feedback-warning-border); color: var(--feedback-warning); font-size: 11px; padding: 2px 10px; border-radius: 999px;">● Aguardando retorno</span>
    <span style="align-self: flex-start; background: var(--ai-surface); border: 1px solid var(--ai-border); color: var(--ai-text); font-size: 11px; padding: 2px 10px; border-radius: 999px;">✦ 87 Match</span>
  </div>
</div>
<div style="font-size: 11px; color: var(--text-subtle); margin-top: 8px;">Ativado por <code style="font-family: var(--font-mono);">[data-theme="dark"]</code> — todos os tokens semânticos remapeados.</div>
</body>
</html>
