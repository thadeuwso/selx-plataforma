<!-- @dsCard group="Spacing" viewport="700x230" name="Densidade" subtitle="Confortável (padrão) vs compacta (operação intensa)" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; background: var(--surface-default); font-family: var(--font-sans); color: var(--text-body); }

</style>
</head>
<body>
<div style="display: flex; gap: 20px;">

<div style="flex: 1;">
  <div style="font-size: 11px; color: var(--text-subtle); margin-bottom: 6px;">Confortável — decisão e leitura</div>
  <div style="border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden;">
    
    <div style="height: var(--row-height); display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: var(--text-body); border-bottom: 1px solid var(--border-subtle);">Ana Souza</div>
    <div style="height: var(--row-height); display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: var(--text-body); border-bottom: 1px solid var(--border-subtle);">Bruno Lima</div>
    <div style="height: var(--row-height); display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: var(--text-body); ">Carla Mendes</div>
  </div>
</div>
<div style="flex: 1;">
  <div style="font-size: 11px; color: var(--text-subtle); margin-bottom: 6px;">Compacta — tabelas e operação</div>
  <div style="border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden;">
    
    <div style="height: var(--row-height-compact); display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: var(--text-body); border-bottom: 1px solid var(--border-subtle);">Ana Souza</div>
    <div style="height: var(--row-height-compact); display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: var(--text-body); border-bottom: 1px solid var(--border-subtle);">Bruno Lima</div>
    <div style="height: var(--row-height-compact); display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: var(--text-body); ">Carla Mendes</div>
  </div>
</div>
</div>
<div style="font-size: 11px; color: var(--text-subtle); margin-top: 8px;">Controles: 36px / 28px. A escolha é do padrão de tela, não do gosto de quem desenha.</div>
</body>
</html>
