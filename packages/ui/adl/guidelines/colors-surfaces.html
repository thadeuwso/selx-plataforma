<!-- @dsCard group="Colors" viewport="700x190" name="Superfícies e texto" subtitle="Camada semântica: pares texto/fundo com contraste validado" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; background: var(--surface-default); font-family: var(--font-sans); }
.row { display: flex; gap: 8px; align-items: center; }
.sw { flex: 1; height: 64px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; box-sizing: border-box; }
.sw span { font-size: 10px; font-family: var(--font-mono); }

</style>
</head>
<body>
<div class="row" style="align-items: stretch; gap: 12px;">
<div style="flex:1; background: var(--surface-page); border-radius: var(--radius-md); padding: 12px; border: 1px solid var(--border-subtle);">
  <div style="font-size:11px; font-family:var(--font-mono); color:var(--text-subtle);">--surface-page</div>
  <div style="background: var(--surface-default); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 10px; margin-top: 8px; box-shadow: var(--elevation-raised);">
    <div style="color: var(--text-strong); font-weight: 600; font-size: 13px;">--text-strong</div>
    <div style="color: var(--text-body); font-size: 13px;">--text-body</div>
    <div style="color: var(--text-muted); font-size: 13px;">--text-muted</div>
    <div style="color: var(--text-subtle); font-size: 13px;">--text-subtle</div>
  </div>
</div>
<div style="flex:1; display:flex; flex-direction:column; gap:6px;">
  <div style="flex:1; background: var(--surface-selected); border: 1px solid var(--border-selected); border-radius: var(--radius-md); display:flex; align-items:center; padding: 0 12px; font-size: 12px; color: var(--action-primary);">--surface-selected · seleção</div>
  <div style="flex:1; background: var(--surface-sunken); border-radius: var(--radius-md); display:flex; align-items:center; padding: 0 12px; font-size: 12px; color: var(--text-muted);">--surface-sunken · áreas rebaixadas</div>
  <div style="flex:1; background: var(--surface-inverse); border-radius: var(--radius-md); display:flex; align-items:center; padding: 0 12px; font-size: 12px; color: var(--text-inverse);">--surface-inverse · toast</div>
</div>
</div>
</body>
</html>
