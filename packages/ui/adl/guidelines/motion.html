<!-- @dsCard group="Spacing" viewport="700x180" name="Movimento" subtitle="Feedback e continuidade — nunca espetáculo" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; background: var(--surface-default); font-family: var(--font-sans); color: var(--text-body); }
@keyframes slide-instant { 0%, 4% { transform: translateX(0); } 8%, 50% { transform: translateX(150%); } 54%, 100% { transform: translateX(0); } }
@keyframes slide-fast { 0%, 7% { transform: translateX(0); } 14%, 50% { transform: translateX(150%); } 57%, 100% { transform: translateX(0); } }
@keyframes slide-base { 0%, 10% { transform: translateX(0); } 20%, 50% { transform: translateX(150%); } 60%, 100% { transform: translateX(0); } }
@media (prefers-reduced-motion: reduce) { div { animation: none !important; } }
</style>
</head>
<body>
<div style="display: flex; gap: 16px;">

<div style="flex: 1; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 12px;">
  <div style="height: 6px; border-radius: 999px; background: var(--surface-sunken); overflow: hidden;">
    <div style="width: 40%; height: 100%; background: var(--brand-500); border-radius: 999px; animation: slide-instant 2s var(--ease-standard) infinite;"></div>
  </div>
  <div style="font-size: 12px; font-family: var(--font-mono); color: var(--text-body); margin-top: 10px;">--duration-instant · 80ms</div>
  <div style="font-size: 11px; color: var(--text-muted);">hover, press</div>
</div>
<div style="flex: 1; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 12px;">
  <div style="height: 6px; border-radius: 999px; background: var(--surface-sunken); overflow: hidden;">
    <div style="width: 40%; height: 100%; background: var(--brand-500); border-radius: 999px; animation: slide-fast 2s var(--ease-standard) infinite;"></div>
  </div>
  <div style="font-size: 12px; font-family: var(--font-mono); color: var(--text-body); margin-top: 10px;">--duration-fast · 140ms</div>
  <div style="font-size: 11px; color: var(--text-muted);">estados locais</div>
</div>
<div style="flex: 1; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 12px;">
  <div style="height: 6px; border-radius: 999px; background: var(--surface-sunken); overflow: hidden;">
    <div style="width: 40%; height: 100%; background: var(--brand-500); border-radius: 999px; animation: slide-base 2s var(--ease-standard) infinite;"></div>
  </div>
  <div style="font-size: 12px; font-family: var(--font-mono); color: var(--text-body); margin-top: 10px;">--duration-base · 200ms</div>
  <div style="font-size: 11px; color: var(--text-muted);">modais, drawers</div>
</div>
</div>
<div style="font-size: 11px; color: var(--text-subtle); margin-top: 10px;">Easing: <code style="font-family: var(--font-mono);">cubic-bezier(0.2, 0, 0, 1)</code> · prefers-reduced-motion é lei · skeletons em vez de spinners.</div>
</body>
</html>
