<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--surface-default); margin: 0; padding: 16px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const DS = window.AIONDesignLanguageADL_e674b3;
const { TextField, TextArea, Select, Combobox, DateField, Checkbox, Radio, Switch, FileUpload } = DS;
function Demo() {
  const [cargo, setCargo] = React.useState('analista-dados');
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, alignItems: 'start' }}>
      <TextField label="Nome da vaga" placeholder="Ex.: Analista de dados" required />
      <TextField label="E-mail" type="email" defaultValue="ana.souza@" error="E-mail inválido. Verifique o formato." />
      <Select label="Senioridade" placeholder="Selecione" options={['Júnior', 'Pleno', 'Sênior']} />
      <Combobox label="Cargo" value={cargo} onChange={setCargo} options={[
        { value: 'analista-dados', label: 'Analista de dados' },
        { value: 'analista-rh', label: 'Analista de RH' },
        { value: 'dev-frontend', label: 'Desenvolvedor(a) front-end' },
        { value: 'designer', label: 'Product designer' },
      ]} />
      <DateField label="Data de início" defaultValue="2026-08-03" />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <Checkbox label="Aceito receber comunicações" help="Você pode alterar depois." defaultChecked />
        <Switch label="Notificar por e-mail" defaultChecked />
      </div>
      <Radio label="Modelo de trabalho" defaultValue="hibrido" options={[
        { value: 'presencial', label: 'Presencial' },
        { value: 'hibrido', label: 'Híbrido', help: '2–3 dias no escritório' },
        { value: 'remoto', label: 'Remoto' },
      ]} />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <TextArea label="Descrição da vaga" rows={2} help="Descreva responsabilidades e requisitos." />
        <FileUpload label="Currículo" accept=".pdf" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
