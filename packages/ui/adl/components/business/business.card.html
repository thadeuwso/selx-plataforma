<!-- @dsCard group="Components" viewport="700x560" name="Business (RH)" subtitle="Card de pessoa, score com explicação, KPI, pipeline" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--surface-default); margin: 0; padding: 16px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const DS = window.AIONDesignLanguageADL_e674b3;
const { PersonCard, ScoreIndicator, KpiCard, PipelineBoard, ActionMenu } = DS;
function Demo() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, alignItems: 'start' }}>
        <PersonCard name="Ana Souza" role="Analista de dados" status="Em entrevista" statusTone="info"
          actions={<ScoreIndicator value={87} confidence="alta" criteria={[{ label: 'Experiência com dados', value: 92 }, { label: 'Inglês', value: 60 }]} />} />
        <PersonCard density="rich" name="Bruno Lima" role="Product designer" status="Aprovado na etapa" statusTone="success"
          meta={['São Paulo — SP', '5 anos de experiência']}
          actions={<ActionMenu items={[{ label: 'Ver perfil', icon: 'user' }]} />} />
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
        <KpiCard label="Turnover" value="3,2%" delta="-0,4 p.p." deltaDirection="up" period="vs. mês anterior" />
        <KpiCard label="Headcount" value="248" delta="+6" period="no mês" />
        <KpiCard label="Tempo de contratação" value="23 dias" delta="-4 dias" deltaDirection="up" period="vs. trimestre" />
      </div>
      <PipelineBoard stages={[
        { id: 'triagem', label: 'Triagem', cards: [{ id: 'c1', name: 'Carla Mendes', role: 'Analista de RH', score: 74 }] },
        { id: 'entrevista', label: 'Entrevista', cards: [{ id: 'c2', name: 'Diego Alves', role: 'Analista de RH', score: 88 }] },
        { id: 'proposta', label: 'Proposta', cards: [] },
      ]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
