<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--surface-default); margin: 0; padding: 16px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const DS = window.AIONDesignLanguageADL_e674b3;
const { DataTable, StatusBadge, Avatar, Stat, Tag, ListView, Tooltip, Button } = DS;
const rows = [
  { id: 1, nome: 'Ana Souza', vaga: 'Analista de dados', salario: 'R$ 7.500', status: 'Em entrevista', tone: 'info' },
  { id: 2, nome: 'Bruno Lima', vaga: 'Analista de dados', salario: 'R$ 6.800', status: 'Aprovado na etapa', tone: 'success' },
  { id: 3, nome: 'Carla Mendes', vaga: 'Product designer', salario: 'R$ 9.200', status: 'Aguardando retorno', tone: 'warning' },
];
function Demo() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', gap: 24, alignItems: 'center', flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', gap: 8 }}>
          <StatusBadge tone="success">Aprovado na etapa</StatusBadge>
          <StatusBadge tone="warning">Aguardando retorno</StatusBadge>
          <StatusBadge tone="danger">Não aprovado</StatusBadge>
          <StatusBadge tone="neutral">Rascunho</StatusBadge>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <Avatar name="Ana Souza" size="sm" /><Avatar name="Bruno Lima" size="md" /><Avatar name="Carla Mendes" size="lg" />
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <Tag>SQL</Tag><Tag>Power BI</Tag><Tag onRemove={() => {}}>Filtro: São Paulo</Tag>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 48 }}>
        <Stat label="Tempo médio de contratação" value="23 dias" delta="-4 dias" deltaDirection="up" period="vs. trimestre anterior" />
        <Stat label="Candidaturas no mês" value="1.284" delta="+12%" period="vs. mês anterior" />
        <Tooltip content="Exportar CSV"><Button variant="subtle" size="compact" icon="download">Exportar</Button></Tooltip>
      </div>
      <DataTable compact selectable
        columns={[
          { key: 'nome', label: 'Candidato', sortable: true },
          { key: 'vaga', label: 'Vaga' },
          { key: 'salario', label: 'Pretensão', numeric: true },
          { key: 'status', label: 'Status', render: (r) => <StatusBadge tone={r.tone}>{r.status}</StatusBadge> },
        ]}
        rows={rows} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
