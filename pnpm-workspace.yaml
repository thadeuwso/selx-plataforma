packages:
  - "apps/*"
  - "packages/*"

# Dependências autorizadas a executar scripts de build no install (pnpm 11).
# Prisma: gera engines nativas. Sharp: binários de imagem do Next.js.
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  sharp: true
  # Resolver nativo do ESLint. O lint roda sem o binário compilado (verificado),
  # então não há motivo para executar script de build na instalação.
  unrs-resolver: false
